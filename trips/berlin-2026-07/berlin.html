<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trip Plan</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#fff;--fg:#1a1a1a;--card:#f5f5f7;--accent:#2563eb;--muted:#6b7280;--warn:#b45309;--ok:#15803d;--border:#e5e7eb}
@media(prefers-color-scheme:dark){:root{--bg:#111418;--fg:#e7e9ec;--card:#1c2128;--accent:#60a5fa;--muted:#9aa3af;--warn:#fbbf24;--ok:#4ade80;--border:#2d333b}}
*{box-sizing:border-box}
body{margin:0;font:15px/1.5 system-ui,sans-serif;background:var(--bg);color:var(--fg)}
header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:baseline}
h1{font-size:20px;margin:0}
h2{font-size:17px}
#tabs button{margin-right:6px;padding:6px 14px;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:16px;cursor:pointer;font-size:14px}
#tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
main{display:grid;grid-template-columns:minmax(340px,44%) 1fr;height:calc(100vh - 57px)}
#itinerary{overflow-y:auto;padding:4px 16px 16px}
#map{height:100%}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.card h3{margin:0 0 4px;font-size:16px}
.num{display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;align-items:center;justify-content:center;font-size:12px;margin-right:6px}
.factline{color:var(--muted);font-size:13px;margin:4px 0}
.links a{margin-right:10px;font-size:13px;color:var(--accent)}
.ask{margin-top:8px;font-size:13px;position:relative}
.ask-toggle{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:14px;padding:5px 12px;font-size:13px}
.ask-toggle:hover{border-color:var(--accent)}
.ask-menu{position:absolute;z-index:5;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.18);overflow:hidden;min-width:150px}
.ask-menu[hidden]{display:none}
.ask-bot{display:block;width:100%;text-align:left;padding:8px 14px;border:0;background:none;color:var(--fg);cursor:pointer;font-size:13px}
.ask-bot:hover{background:var(--card)}
.ask .factline{margin-top:6px}
.transit{color:var(--muted);font-size:13px;margin:0 0 10px 10px;border-left:2px dotted var(--muted);padding-left:10px}
.brief{margin:4px 0}
details.alt,details.more{margin-top:8px}
details.alt summary,details.more summary{cursor:pointer;font-size:13px;color:var(--accent)}
details.more div{margin-top:6px;color:var(--fg)}
.meal .opt{margin:4px 0;font-size:14px}
.skip{border-left:3px solid var(--muted);opacity:.88}
.skip h3{font-size:14px}
.warn{color:var(--warn)}.ok{color:var(--ok)}
footer{border-top:1px solid var(--border);padding:4px 20px 12px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pin{background:var(--accent);color:#fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.pin span{transform:rotate(45deg);font-size:11px;font-weight:700}
.pin.alt{background:var(--bg);color:var(--accent);border-color:var(--accent)}
.pin.meal{background:#d97706}
.pin.hl{outline:3px solid var(--warn)}
@media print{#map,#tabs,button{display:none!important}main{display:block;height:auto}#itinerary{overflow:visible}}
@media(max-width:800px){main{display:block;height:auto}#map{height:50vh}footer{display:block}}
</style>
</head>

    else if(it.type==='transit')h+='<div class="transit">🚋 '+esc(it.mode)+' · '+esc(it.from)+' → '+esc(it.to)+' · '+esc(it.minutes)+' '+esc(t('min'))+(it.note?' · '+esc(it.note):'')+'</div>';
  });
  if(coords.length>1)h+='<p><a target="_blank" href="'+gmapsDir(coords)+'">📍 '+esc(t('fullDayRoute'))+'</a></p>';
  if(day.skipped&&day.skipped.length)h+='<h2>🗒 '+esc(t('notIncluded'))+'</h2>'+day.skipped.map(s=>'<div class="card skip"><h3>'+esc(s.name)+'</h3><div class="factline">'+esc(s.reason)+'</div></div>').join('');
  itin.innerHTML=h;
  const b=L.latLngBounds(coords.length?coords:[[50,14]]);
  layers[di].eachLayer(l=>{if(l.getLatLng)b.extend(l.getLatLng())});
  map.fitBounds(b.pad(0.2));
}
D.days.forEach((d,i)=>{const b=document.createElement('button');b.textContent=d.label;b.onclick=()=>show(i);tabs.appendChild(b)});
const BOT_URLS={
  claude:p=>'https://claude.ai/new?q='+encodeURIComponent(p),
  chatgpt:p=>'https://chatgpt.com/?q='+encodeURIComponent(p),
  gemini:p=>'https://gemini.google.com/app?q='+encodeURIComponent(p),
  grok:p=>'https://grok.com/?q='+encodeURIComponent(p),
  deepseek:()=>'https://chat.deepseek.com/'
};
document.addEventListener('click',e=>{
  if(!e.target.closest('.ask'))document.querySelectorAll('.ask-menu').forEach(m=>m.hidden=true);
});
itin.addEventListener('click',e=>{
  const toggle=e.target.closest('.ask-toggle');
  if(toggle){
    const menu=toggle.nextElementSibling,wasHidden=menu.hidden;
    document.querySelectorAll('.ask-menu').forEach(m=>m.hidden=true);
    menu.hidden=!wasHidden;
    return;
  }
  const botBtn=e.target.closest('.ask-bot');
  if(botBtn){
    const wrap=botBtn.closest('.ask'),prompt=wrap.dataset.prompt;
    if(navigator.clipboard)navigator.clipboard.writeText(prompt);
    const build=BOT_URLS[botBtn.dataset.bot];
    if(build)window.open(build(prompt),'_blank','noopener');
    wrap.querySelector('.ask-menu').hidden=true;
    const label=wrap.querySelector('.ask-toggle-label'),orig=label.textContent;
    label.textContent='✓ '+t('copied');setTimeout(()=>label.textContent=orig,1500);
    return;
  }
  const alt=e.target.closest('details.alt'),card=e.target.closest('[data-mid]');
  const mid=alt?alt.dataset.mid:card&&card.dataset.mid;
  const m=mid&&markersById[mid];
  if(m){m.openPopup();const el=m.getElement();if(el){const p=el.querySelector('.pin');p.classList.add('hl');setTimeout(()=>p.classList.remove('hl'),1600)}}
});
const tp=document.getElementById('transport'),tr=D.transport||{};
tp.innerHTML='<h2>🚇 '+esc(t('transport'))+'</h2><p>'+esc(tr.summary||'')+'</p><p><b>'+esc(t('tickets'))+':</b> '+esc(tr.ticketAdvice||'')+'</p>'
 +(tr.apps&&tr.apps.length?'<p><b>'+esc(t('apps'))+':</b> '+tr.apps.map(esc).join(', ')+'</p>':'')
 +(tr.facts||[]).map(f=>'<p class="factline">'+(f.verified?'<span class="ok">✓ '+esc(t('verified'))+' '+esc(f.verified)+'</span>':'<span class="warn">⚠ '+esc(t('unverified'))+'</span>')+' — '+esc(f.text)+'</p>').join('');
const mm=document.getElementById('mymaps'),my=D.mymaps||{};
mm.innerHTML='<h2>📱 '+esc(t('onYourPhone'))+'</h2>'+(my.shareUrl
 ?'<iframe src="'+esc(my.shareUrl.replace('/edit','/embed'))+'" width="100%" height="220" style="border:0"></iframe>'
 :'<ol><li>'+esc(t('mymapsStep1'))+'</li><li>'+esc(t('mymapsStep2'))+' <b>'+esc(my.kmlFile||'')+'</b></li><li>'+esc(t('mymapsStep3'))+'</li></ol>');
show(0);
})();
</script>
</body>
</html>
